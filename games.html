<html>

<head>
    <title>Game verse</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        header {
            background: #1f2937;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: white;
            margin-left: 20px;
            font-size: large;
            transition-duration: 0.3ms;
        }

        nav a:hover {
            color: #38bdf8
        }

        .photo {
            background:
                linear-gradient(rgba(0, 0, 0, .6), rgba(0, 0, 0, .6)),
                url("WhatsApp Image 2026-07-16 at 11.41.45 AM (1).jpeg");
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: xx-large;
            color: white;
            background-size: cover;
        }

        .game {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: nowrap;
            /* keeps all cards in one row */
            padding: 20px;
            background-color: #1f2937;
        }

        .title {
            text-align: center;
            margin: 0;
            padding: 0;
            background-color: #1f2937;
        }


        .card {
            width: 220px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .card h3 {
            padding: 15px;
        }

        article {
            display: flex;
            gap: 40px;
            padding: 20px;
            justify-content: center;
            align-items: center;
        }

        button {
            color: black;
            background-color: aqua;
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background-color: rgb(79, 160, 241);
            color: black;
        }
        footer{
            text-align: center;
            justify-content: center;
            color:aqua
        }
    </style>
</head>

<body style="background-color: #1f2937;">
    <header>
        <h1 style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;color:#38bdf8;">

            🎮 GameVerse

        </h1>

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="news.html">News</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <section class="photo">
        <h2>Welcome To Game Verse</h2>
        <p>Discover the latest games, reviews, and gaming news</p>
        <br>
        <a href="games.html"><button>Explore</button></a>
    </section>

    <h1 class="title"
        style="font-size: xx-large; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;color:#38bdf8;">
        Featured Games</h1>
    <article>
        <div class="game">
            <div class="card">
                <img src="WhatsApp Image 2026-07-16 at 11.41.45 AM.jpeg" alt="GTA V">
                <h3><a href="https://www.rockstargames.com/VI" target="_blank" style="text-decoration:none;color:inherit;">GTA 6</a></h3>
            </div>

            <div class="card">
                <img src="WhatsApp Image 2026-07-16 at 11.41.45 AM (2).jpeg" alt="Forza Horizon">
                <h3><a href="https://forza.net/" target="_blank" style="text-decoration:none;color:inherit;">Racing</a></h3>
            </div>

            <div class="card">
                <img src="WhatsApp Image 2026-07-16 at 11.41.45 AM (4).jpeg" alt="Valorant">
                <h3><a href="https://playvalorant.com/" target="_blank" style="text-decoration:none;color:inherit;">Multiplayer</a></h3>
            </div>

            <div class="card">
                <img src="WhatsApp Image 2026-07-16 at 11.41.45 AM (3).jpeg" alt="Call of Duty">
                <h3><a href="https://www.callofduty.com/" target="_blank" style="text-decoration:none;color:inherit;">Battle Games</a></h3>
            </div>
        </div>
    </article>
    <footer>
        <p>© 2026 GameVerse | All Rights Reserved</p>
    </footer>

</body>

</html>
