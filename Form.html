<html>
<head>
    <title>Basic Html Form</title>
</head>
<body style = "background-color:rgba(41, 207, 245, 0.778); font-size: large;">
    <center>
    <h2> User Registration Form</h2>
    <form action = "D:\Untitled-1.html" method = "post">
        
        <label for = "name">Full Name: </label>
        <input type = "text" id = "name" name = "Full Name">
        
        <br><br>
       
        <label for = "email">Email: </label>
        <input type = "email" id = "email" name = "email">
        
        <br><br>

        <label for = "Password">Password: </label>
        <input type = "Password" id = "Password" name = "Password">

        <br><br>

        <label for = "Age">Age: </label>
        <input type = "Age" id = "Age" name = "Age" min = "1">

        <br><br>
       
        <p> Gender</p>
        <input type = "radio" id = "male" name = "gender" value = "male">
        <label for = "male">Male</label>

        <input type = "radio" id = "female" name = "gender" value = "female">
        <label for = "female">Female</label>

        <br><br>

        <input type = "checkbox" id = "agree" name = "terms">
        <label for = "agree" > I agree to the terms and conditions</label>

        <br><br>
        <button type = "submit" >Register</button>
    </form></center>
</body>
</html>
